name: FounderMap Pipeline

on:
  schedule:
    # Scraper + classifier: every 12 hours
    - cron: '0 */12 * * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  scrape-and-classify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: python scraper.py

      - name: Run classifier
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python classifier.py

  validate-submissions:
    runs-on: ubuntu-latest
    # Run 4 times a day on offset schedule (3h, 9h, 15h, 21h UTC)
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule')
    defaults:
      run:
        working-directory: pipeline

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run submission validator
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python validate_submission.py
